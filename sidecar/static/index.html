<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Hermes Voice</title>
  <link rel="icon" href="data:,">
  <style>
    @font-face {
      font-family: "Urbanist";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url("/static/fonts/urbanist-latin-400-normal.woff2") format("woff2");
    }

    @font-face {
      font-family: "Urbanist";
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url("/static/fonts/urbanist-latin-500-normal.woff2") format("woff2");
    }

    @font-face {
      font-family: "Urbanist";
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url("/static/fonts/urbanist-latin-600-normal.woff2") format("woff2");
    }

    @font-face {
      font-family: "Urbanist";
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url("/static/fonts/urbanist-latin-700-normal.woff2") format("woff2");
    }

    @font-face {
      font-family: "Urbanist";
      font-style: normal;
      font-weight: 800;
      font-display: swap;
      src: url("/static/fonts/urbanist-latin-800-normal.woff2") format("woff2");
    }

    :root {
      color-scheme: dark;
      --font-ui: "Urbanist", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-display: "Urbanist", ui-sans-serif, system-ui, sans-serif;
      --font-mono: "SFMono-Regular", "Cascadia Mono", "Liberation Mono", Menlo, Monaco, Consolas, monospace;
      --bg: oklch(7.6% 0.01 158);
      --surface: oklch(11.5% 0.012 150);
      --surface-2: oklch(15% 0.011 135);
      --surface-3: oklch(18.5% 0.012 118);
      --text: oklch(93.5% 0.014 106);
      --muted: oklch(72% 0.016 118);
      --dim: oklch(50% 0.016 118);
      --line: color-mix(in oklch, var(--text) 15%, transparent);
      --line-strong: color-mix(in oklch, var(--text) 25%, transparent);
      --panel: color-mix(in oklch, var(--surface) 88%, transparent);
      --panel-solid: oklch(10.8% 0.012 150);
      --accent: oklch(76% 0.115 76);
      --accent-soft: oklch(84% 0.055 78);
      --accent-rgb: 242 184 92;
      --accent-hot-rgb: 255 244 216;
      --accent-mid-rgb: 255 209 132;
      --accent-muted-rgb: 242 184 92;
      --green: oklch(76% 0.12 150);
      --blue: oklch(76% 0.08 218);
      --gold: var(--accent);
      --gold-soft: var(--accent-soft);
      --red: oklch(68% 0.18 28);
      --shadow: rgba(0, 0, 0, 0.48);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    :root[data-palette="green"] {
      --accent: oklch(76% 0.15 150);
      --accent-soft: oklch(86% 0.07 152);
      --accent-rgb: 74 222 128;
      --accent-hot-rgb: 220 255 232;
      --accent-mid-rgb: 126 246 178;
      --accent-muted-rgb: 74 222 128;
    }

    :root[data-palette="red"] {
      --accent: oklch(68% 0.18 28);
      --accent-soft: oklch(82% 0.08 32);
      --accent-rgb: 255 87 87;
      --accent-hot-rgb: 255 232 220;
      --accent-mid-rgb: 255 138 112;
      --accent-muted-rgb: 255 87 87;
    }

    :root[data-palette="outrun"] {
      --bg: oklch(7.2% 0.035 292);
      --surface: oklch(11% 0.035 292);
      --surface-2: oklch(15% 0.04 292);
      --surface-3: oklch(19% 0.055 292);
      --text: oklch(95% 0.025 318);
      --muted: oklch(76% 0.045 320);
      --accent: oklch(76% 0.24 338);
      --accent-soft: oklch(83% 0.13 210);
      --accent-rgb: 255 54 169;
      --accent-hot-rgb: 255 238 252;
      --accent-mid-rgb: 57 255 243;
      --accent-muted-rgb: 176 78 255;
      --line: color-mix(in oklch, var(--accent-soft) 22%, transparent);
      --line-strong: color-mix(in oklch, var(--accent-soft) 34%, transparent);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      letter-spacing: 0;
      font-size: 15px;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      touch-action: manipulation;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background:
        linear-gradient(rgba(255, 255, 255, 0.014) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px),
        radial-gradient(circle at 50% 44%, color-mix(in oklch, var(--gold) 6%, transparent), transparent 34%),
        radial-gradient(circle at 14% 88%, rgba(22, 42, 37, 0.2), transparent 34%),
        radial-gradient(circle at 86% 14%, rgba(60, 43, 20, 0.12), transparent 30%),
        var(--bg);
      background-size: 32px 32px, 32px 32px, auto, auto, auto, auto;
    }

    :root[data-palette="outrun"] canvas {
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px),
        radial-gradient(circle at 50% 42%, rgba(255, 54, 169, 0.14), transparent 34%),
        radial-gradient(circle at 16% 86%, rgba(57, 255, 243, 0.14), transparent 32%),
        radial-gradient(circle at 88% 14%, rgba(176, 78, 255, 0.2), transparent 30%),
        linear-gradient(180deg, rgba(16, 4, 30, 0.0), rgba(255, 54, 169, 0.045)),
        var(--bg);
    }

    .chrome {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: calc(18px + var(--safe-top)) 18px calc(18px + var(--safe-bottom));
      pointer-events: none;
      z-index: 3;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      pointer-events: auto;
    }

    .brand {
      min-width: 0;
      display: grid;
      gap: 2px;
      padding-left: 12px;
      border-left: 2px solid color-mix(in oklch, var(--gold) 68%, transparent);
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 20px;
      line-height: 1;
      font-weight: 500;
      text-transform: lowercase;
    }

    .substate {
      min-height: 14px;
      max-width: min(46vw, 540px);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.15;
      font-weight: 600;
      text-transform: lowercase;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .substate.model-detail {
      color: var(--gold);
    }

    .connection {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      max-width: 45vw;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: linear-gradient(180deg, color-mix(in oklch, var(--surface-2) 72%, transparent), color-mix(in oklch, var(--surface) 88%, transparent));
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: lowercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .dot {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--red);
    }

    .dot.on {
      background: var(--green);
    }

    .readout {
      align-self: center;
      justify-self: center;
      width: min(500px, calc(100vw - 40px));
      transform: translateY(min(27vh, 230px));
      text-align: center;
      pointer-events: none;
    }

    .state {
      font-family: var(--font-display);
      font-size: clamp(20px, 3.2vw, 34px);
      line-height: 0.98;
      font-weight: 800;
      text-transform: lowercase;
    }

    .detail {
      margin-top: 8px;
      min-height: 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      font-weight: 500;
      text-transform: lowercase;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .readout.tool-cue .state {
      color: #fff7e8;
      animation: toolReadoutFade 2.8s linear both;
    }

    :root[data-palette="outrun"] .readout.tool-cue .state {
      color: rgb(var(--accent-hot-rgb));
      text-shadow:
        0 0 12px rgb(var(--accent-rgb) / 0.58),
        0 0 28px rgb(var(--accent-mid-rgb) / 0.34);
    }

    .readout.tool-cue .detail {
      color: rgba(244, 247, 245, 0.82);
      animation: toolReadoutDetailFade 2.8s linear both;
    }

    @keyframes toolReadoutFade {
      0% {
        opacity: 0;
      }

      3.5% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes toolReadoutDetailFade {
      0% {
        opacity: 0;
      }

      3.5% {
        opacity: 0.88;
      }

      100% {
        opacity: 0;
      }
    }

    .tool-ticker-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }

    .tool-ticker-line {
      position: absolute;
      left: 0;
      top: var(--ticker-top, 45vh);
      max-width: none;
      white-space: nowrap;
      color: rgb(var(--accent-mid-rgb) / 0.82);
      font: 800 clamp(14px, 1.8vw, 24px)/1 var(--font-display);
      text-transform: lowercase;
      text-shadow:
        0 0 7px rgb(var(--accent-rgb) / 0.78),
        0 0 22px rgb(var(--accent-rgb) / 0.4);
      opacity: 0;
      transform: translateX(calc(100vw + 24px));
      animation: toolTickerRun var(--ticker-duration, 2.1s) linear forwards;
      will-change: transform, opacity;
      mix-blend-mode: screen;
    }

    .tool-ticker-line span {
      display: inline-block;
      margin-right: 0.52em;
    }

    .tool-ticker-line .hot {
      color: #fff4d8;
      font-weight: 900;
      text-shadow:
        0 0 8px rgb(var(--accent-hot-rgb) / 0.92),
        0 0 28px rgb(var(--accent-rgb) / 0.74);
    }

    :root[data-palette="outrun"] .tool-ticker-line .hot {
      color: rgb(var(--accent-hot-rgb));
      text-shadow:
        0 0 8px rgb(var(--accent-mid-rgb) / 0.88),
        0 0 30px rgb(var(--accent-rgb) / 0.78),
        0 0 52px rgb(var(--accent-muted-rgb) / 0.48);
    }

    .tool-ticker-line .strong {
      color: rgb(var(--accent-mid-rgb));
      font-weight: 900;
    }

    .tool-ticker-line .dim {
      color: rgb(var(--accent-rgb) / 0.46);
      font-weight: 680;
    }

    @keyframes toolTickerRun {
      0% {
        opacity: 0;
        transform: translateX(calc(100vw + 24px));
      }

      7% {
        opacity: 0.95;
      }

      82% {
        opacity: 0.95;
      }

      100% {
        opacity: 0;
        transform: translateX(-115%);
      }
    }

    .dock {
      position: relative;
      justify-self: center;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--surface-2) 72%, transparent), color-mix(in oklch, var(--surface) 90%, transparent));
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 54px var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      pointer-events: auto;
    }

    .dock::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 1px solid rgb(var(--accent-rgb) / 0.08);
      border-radius: 5px;
      pointer-events: none;
    }

    .dock.mic-active {
      border-color: var(--line);
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--surface-2) 72%, transparent), color-mix(in oklch, var(--surface) 90%, transparent));
      box-shadow: 0 18px 54px var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    button,
    textarea,
    input,
    select {
      font: inherit;
    }

    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 8px;
      background: color-mix(in oklch, var(--surface-2) 82%, transparent);
      color: var(--text);
      cursor: pointer;
      text-transform: lowercase;
      touch-action: manipulation;
    }

    button:focus-visible,
    textarea:focus-visible,
    input:focus-visible {
      outline: 2px solid rgb(var(--accent-rgb) / 0.9);
      outline-offset: 3px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .icon-button {
      position: relative;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-color: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      background: linear-gradient(180deg, color-mix(in oklch, var(--surface-3) 76%, transparent), color-mix(in oklch, var(--surface-2) 86%, transparent));
      transition: background 160ms cubic-bezier(.22, 1, .36, 1), border-color 160ms cubic-bezier(.22, 1, .36, 1), transform 160ms cubic-bezier(.22, 1, .36, 1);
    }

    .icon-button:hover {
      background: color-mix(in oklch, var(--surface-2) 72%, var(--text) 7%);
      transform: translateY(-1px);
    }

    .icon-button.active {
      border-color: rgb(var(--accent-rgb) / 0.44);
      background: rgb(var(--accent-rgb) / 0.14);
    }

    .icon-button.danger.active {
      border-color: rgba(255, 116, 109, 0.5);
      background: rgba(255, 116, 109, 0.15);
    }

    .icon-button.mic-active {
      color: #fff4dc;
      border-color: rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, color-mix(in oklch, var(--surface-3) 76%, transparent), color-mix(in oklch, var(--surface-2) 86%, transparent));
    }

    .icon-button.mic-active .icon {
      filter:
        drop-shadow(0 0 5px rgb(var(--accent-rgb) / 0.78))
        drop-shadow(0 0 14px rgb(var(--accent-rgb) / 0.42));
    }

    #mute::after {
      content: "";
      position: absolute;
      width: 27px;
      height: 3px;
      border-radius: 999px;
      background: #ff4d45;
      box-shadow: 0 0 10px rgba(255, 77, 69, 0.48);
      transform: rotate(-42deg);
      opacity: 1;
      transition: opacity 130ms ease;
      pointer-events: none;
    }

    #mute.mic-active::after {
      opacity: 0;
    }

    .icon {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .panel {
      position: fixed;
      left: 50%;
      bottom: calc(88px + var(--safe-bottom));
      width: min(720px, calc(100vw - 24px));
      max-height: min(64vh, 560px);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--surface-2) 34%, var(--panel-solid)), var(--panel-solid));
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
      box-shadow: 0 26px 84px rgba(0, 0, 0, 0.58), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      overflow: hidden;
      opacity: 0;
      transform: translate(-50%, 18px);
      transition: transform 210ms ease, opacity 210ms ease;
      pointer-events: none;
      z-index: 6;
    }

    .panel.open {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
    }

    textarea {
      width: 100%;
      min-height: 78px;
      max-height: 190px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: color-mix(in oklch, var(--surface-2) 92%, transparent);
      color: var(--text);
      padding: 12px 13px;
      line-height: 1.4;
    }

    textarea::placeholder {
      color: var(--dim);
    }

    select,
    input[type="text"],
    input[type="number"],
    .settings-form textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: color-mix(in oklch, var(--surface-2) 92%, transparent);
      color: var(--text);
      padding: 8px 10px;
    }

    select,
    option {
      text-transform: lowercase;
    }

    .settings-form textarea {
      min-height: 142px;
      resize: vertical;
      line-height: 1.42;
    }

    .send {
      min-width: 86px;
      padding: 0 18px;
      border-color: rgb(var(--accent-rgb) / 0.4);
      background: linear-gradient(180deg, color-mix(in oklch, var(--surface-3) 58%, var(--gold) 18%), color-mix(in oklch, var(--surface-2) 76%, var(--gold) 12%));
      font-weight: 800;
    }

    .chat-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .panel-head {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      text-transform: lowercase;
    }

    .panel-head a {
      color: var(--blue);
      text-decoration: none;
    }

    .settings-summary {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #dce2df;
    }

    .log {
      min-height: 190px;
      overflow: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: #dce2df;
      font: 14px/1.45 var(--font-ui);
    }

    .chat-panel .composer {
      border-top: 1px solid var(--line);
      grid-template-columns: 1fr;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .attach {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-color: rgba(255, 255, 255, 0.1);
      background: color-mix(in oklch, var(--surface-2) 88%, transparent);
    }

    .file-input {
      position: fixed;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    .attachment-tray {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 0;
    }

    .attachment-chip {
      max-width: 100%;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 8px;
      border: 1px solid rgba(126, 199, 255, 0.26);
      border-radius: 6px;
      background: rgba(126, 199, 255, 0.09);
      color: #dce2df;
      font-size: 12px;
    }

    .attachment-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-chip button {
      width: 18px;
      height: 18px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
    }

    .settings-panel {
      position: fixed;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .settings-form {
      overflow: auto;
      padding: 14px 16px 16px;
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label,
    .toggle-row span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: lowercase;
    }

    .toggle-row {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 12px;
    }

    .menu-row {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      padding: 0;
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .menu-row span:first-child {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: lowercase;
    }

    .menu-row span:last-child {
      color: var(--gold);
      font-size: 18px;
      line-height: 1;
    }

    .toggle-row input {
      width: 22px;
      height: 22px;
      accent-color: var(--green);
    }

    .submenu-body {
      display: grid;
      gap: 10px;
      padding: 14px;
      align-content: start;
      overflow: auto;
    }

    .voice-editor {
      min-height: clamp(360px, 50vh, 620px);
      max-height: none;
      resize: vertical;
      line-height: 1.45;
    }

    .voice-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .settings-page {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: var(--panel-solid);
      opacity: 0;
      transform: translateX(100%);
      transition: transform 210ms ease, opacity 210ms ease;
      pointer-events: none;
      z-index: 2;
    }

    .settings-page.open {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .back-action {
      min-height: 34px;
      padding: 0 10px 0 0;
      border: 0;
      background: transparent;
      color: var(--gold);
      font-size: 13px;
    }

    .small-action {
      min-height: 34px;
      width: fit-content;
      padding: 0 12px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text);
      background: color-mix(in oklch, var(--surface-2) 88%, transparent);
      border: 1px solid var(--line);
    }

    .update-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      background: color-mix(in oklch, var(--surface-2) 62%, transparent);
    }

    .update-card-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: lowercase;
    }

    .update-status {
      color: var(--text);
      font-size: 12px;
      line-height: 1.4;
      word-break: break-word;
    }

    .update-command {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      word-break: break-all;
    }

    .entry {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .entry-avatar {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: color-mix(in oklch, var(--surface-2) 76%, transparent);
      color: var(--muted);
      font-size: 17px;
    }

    .entry-body {
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: color-mix(in oklch, var(--surface-2) 68%, transparent);
      padding: 8px 10px 9px;
    }

    .entry-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
      color: var(--dim);
      font-size: 11px;
      font-weight: 720;
      letter-spacing: 0;
      text-transform: lowercase;
    }

    .entry-text {
      color: #e7ece9;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .entry.user .entry-avatar {
      color: var(--green);
      background: rgb(var(--accent-rgb) / 0.1);
      font-size: 11px;
      font-weight: 780;
    }

    .entry.assistant .entry-avatar {
      color: var(--gold);
      background: rgb(var(--accent-rgb) / 0.1);
      font-size: 11px;
      font-weight: 780;
    }

    .entry.tool .entry-body {
      border-color: rgb(var(--accent-rgb) / 0.22);
      background: rgb(var(--accent-rgb) / 0.08);
    }

    .entry.tool .entry-avatar {
      color: var(--gold);
      background: rgb(var(--accent-rgb) / 0.12);
    }

    .entry.system {
      grid-template-columns: 1fr;
    }

    .entry.system .entry-avatar {
      display: none;
    }

    .entry.system .entry-body {
      padding: 6px 9px;
      border-style: dashed;
      background: rgba(255, 255, 255, 0.035);
    }

    .entry.system .entry-meta {
      margin: 0;
      font-weight: 560;
    }

    .entry.system .entry-text {
      display: none;
    }

    .meter {
      position: fixed;
      left: 50%;
      top: calc(76px + var(--safe-top));
      width: min(320px, 54vw);
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: rgb(var(--accent-rgb) / 0.08);
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 4;
    }

    .meter > span {
      display: block;
      position: absolute;
      left: 50%;
      top: 0;
      width: var(--meter-level, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgb(var(--accent-rgb) / 0), rgb(var(--accent-mid-rgb) / 0.98) 45%, rgb(var(--accent-mid-rgb)) 50%, rgb(var(--accent-mid-rgb) / 0.98) 55%, rgb(var(--accent-rgb) / 0));
      transform: translateX(-50%);
    }

    .affect-readout {
      position: fixed;
      left: 50%;
      top: calc(88px + var(--safe-top));
      min-height: 18px;
      max-width: min(360px, 68vw);
      color: rgb(var(--accent-mid-rgb) / 0.9);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 680;
      text-align: center;
      text-transform: lowercase;
      letter-spacing: 0;
      opacity: 0;
      transform: translateX(-50%);
      text-shadow: 0 0 14px rgb(var(--accent-rgb) / 0.42);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      z-index: 4;
      transition: opacity 180ms ease;
    }

    .affect-readout.visible {
      opacity: 1;
    }

    .toast {
      position: fixed;
      left: 50%;
      top: calc(74px + var(--safe-top));
      max-width: min(580px, calc(100vw - 28px));
      padding: 11px 13px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: color-mix(in oklch, var(--surface) 92%, transparent);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
      color: #dce2df;
      font-size: 13px;
      line-height: 1.35;
      text-transform: lowercase;
      opacity: 0;
      transform: translate(-50%, -8px);
      transition: transform 180ms ease, opacity 180ms ease;
      pointer-events: none;
      z-index: 7;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .name-field {
      position: fixed;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    @media (max-width: 620px) {
      .chrome {
        padding-inline: 14px;
      }

      h1 {
        font-size: 18px;
      }

      .substate {
        max-width: 56vw;
      }

      .connection {
        max-width: 68vw;
      }

      .readout {
        transform: translateY(24vh);
      }

      .dock {
        gap: 8px;
        padding: 8px;
      }

      .icon-button {
        width: 46px;
        height: 46px;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .send {
        min-height: 44px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .panel,
      .icon-button,
      .readout.tool-cue .state,
      .readout.tool-cue .detail {
        transition: none;
        animation: none;
      }

      .tool-ticker-line {
        --ticker-duration: 4.2s;
        transition: none;
      }
    }
  </style>
</head>

    function readAttachment(file) {
      return new Promise((resolve) => {
        const base = {
          name: file.name,
          type: file.type || 'application/octet-stream',
          size: file.size,
        };
        const readableName = /\.(txt|md|markdown|json|csv|xml|yaml|yml|log)$/i.test(file.name);
        const readableType = /^(text\/|application\/(json|xml|csv|x-yaml|yaml)|.*markdown)/i.test(file.type || '');
        if (file.size > 512 * 1024 || !(readableType || readableName)) {
          resolve(base);
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve({ ...base, text: String(reader.result || '').slice(0, 32000) });
        reader.onerror = () => resolve(base);
        reader.readAsText(file);
      });
    }

    async function buildAttachmentPayload() {
      return Promise.all(attachedFiles.map(readAttachment));

    async function ensureFeedbackAudio() {
      const context = await ensureAudioContext();
      if (!thinkingMasterGain) {
        thinkingMasterGain = context.createGain();
        thinkingMasterGain.gain.value = THINKING_MASTER_VOLUME;
        thinkingMasterGain.connect(context.destination);
      }
      const loadBuffer = async (url) => {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`could not load ${url}`);
        return context.decodeAudioData(await resp.arrayBuffer());
      };
      if (!thinkingLayers.length) {
        thinkingLayers = await Promise.all(THINKING_SOUND_LAYERS.map(async (layer) => {
          const buffer = await loadBuffer(layer.url);
          const gain = context.createGain();
          gain.gain.value = 0;
          gain.connect(thinkingMasterGain);
          return {
            ...layer,
            buffer,
            gain,
            sources: new Set(),
            timers: new Set(),
            generation: 0,
            active: false,
          };
        }));
      }
      if (!pianoNoteBuffers.length) {
        pianoNoteBuffers = await Promise.all(PIANO_NOTE_SAMPLES.map(loadBuffer));
      }
      return thinkingLayers;
    }

    function warmFeedbackAudio() {
      if (!feedbackAudioPromise) {
        feedbackAudioPromise = ensureFeedbackAudio().catch((err) => {
          feedbackAudioPromise = null;
          throw err;
        });
      }
      return feedbackAudioPromise;
    }

    async function unlockThinkingSound() {
      try {
        await ensureAudioContext();
        warmFeedbackAudio().catch(() => {});
      } catch (_) {
        // Browsers may block this until a user gesture; the UI still works.
      }
    }

    function shuffleIndexes(length) {
      const indexes = Array.from({ length }, (_, index) => index);
      for (let i = indexes.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [indexes[i], indexes[j]] = [indexes[j], indexes[i]];
      }
      return indexes;
    }

    function rampGain(gainNode, target, seconds) {
      if (!audioContext || !gainNode) return;
      const now = audioContext.currentTime;
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(gainNode.gain.value, now);
      gainNode.gain.linearRampToValueAtTime(Math.max(0, target), now + Math.max(0.01, seconds));
    }

    function clearLayerTimers(layer) {
      layer.timers.forEach((timer) => window.clearTimeout(timer));
      layer.timers.clear();
    }

    function stopLayerSources(layer, delaySeconds = 0) {
      const stopDelayMs = Math.max(0, delaySeconds * 1000);
      const sources = Array.from(layer.sources);
      layer.sources.clear();
      const stopSources = () => {
        sources.forEach((source) => {
          try {
            source.stop();
          } catch (_) {}
        });
      };
      if (stopDelayMs > 0) {
        window.setTimeout(stopSources, stopDelayMs);
      } else {
        stopSources();
      }
    }

    function scheduleLayerSource(layer, startAt, generation) {
      if (!audioContext || generation !== layer.generation) return;
      const duration = layer.buffer.duration;
      const overlap = Math.min(THINKING_LOOP_OVERLAP_SECONDS, Math.max(0.05, duration * 0.25));
      const safeStartAt = Math.max(startAt, audioContext.currentTime + 0.01);
      const endAt = safeStartAt + duration;
      const source = audioContext.createBufferSource();
      const sourceGain = audioContext.createGain();
      source.buffer = layer.buffer;
      sourceGain.gain.setValueAtTime(0.0001, safeStartAt);
      sourceGain.gain.linearRampToValueAtTime(1, safeStartAt + overlap);
      sourceGain.gain.setValueAtTime(1, Math.max(safeStartAt + overlap, endAt - overlap));
      sourceGain.gain.linearRampToValueAtTime(0.0001, endAt);
      source.connect(sourceGain);
      sourceGain.connect(layer.gain);
      source.onended = () => {
        layer.sources.delete(source);
        try {
          sourceGain.disconnect();
        } catch (_) {}
      };
      layer.sources.add(source);
      source.start(safeStartAt);
      source.stop(endAt + 0.03);

      const nextStart = endAt - overlap;
      const delayMs = Math.max(0, (nextStart - audioContext.currentTime - 0.08) * 1000);
      const timer = window.setTimeout(() => {
        layer.timers.delete(timer);
        scheduleLayerSource(layer, nextStart, generation);
      }, delayMs);
      layer.timers.add(timer);
    }

    function startSyncedThinkingSources() {
      if (!audioContext || !thinkingLayers.length) return;
      const startAt = audioContext.currentTime + 0.04;
      thinkingLayers.forEach((layer) => {
        layer.generation += 1;
        clearLayerTimers(layer);
        stopLayerSources(layer);
        layer.active = false;
        layer.gain.gain.setValueAtTime(0, audioContext.currentTime);
        scheduleLayerSource(layer, startAt, layer.generation);
      });
    }

    function activateNextThinkingLayer() {
      if (!thinkingPulseActive || !thinkingLayers.length) return;
      if (thinkingLayerCursor >= thinkingLayerOrder.length) return;
      const layer = thinkingLayers[thinkingLayerOrder[thinkingLayerCursor]];
      thinkingLayerCursor += 1;
      if (!layer || layer.active) return;
      layer.active = true;
      rampGain(layer.gain, layer.volume, THINKING_FADE_IN_SECONDS);
    }

    function activateToolThinkingLayer() {
      if (!audioContext || !thinkingPulseActive) return;
      if (thinkingLayerCursor <= 1) {
        activateNextThinkingLayer();
        firstToolLayerAt = audioContext.currentTime;
        return;
      }
      if (
        thinkingLayerCursor === 2
        && firstToolLayerAt > 0
        && audioContext.currentTime - firstToolLayerAt >= TOOL_LAYER_MIN_SPACING_SECONDS
      ) {
        activateNextThinkingLayer();
      }
    }

    function fadeOutPianoVoices(seconds = THINKING_FADE_OUT_SECONDS) {
      if (!audioContext || !activePianoVoices.length) return;
      const now = audioContext.currentTime;
      activePianoVoices.forEach((voice) => {
        try {
          voice.gain.gain.cancelScheduledValues(now);
          voice.gain.gain.setValueAtTime(voice.gain.gain.value, now);
          voice.gain.gain.linearRampToValueAtTime(0.0001, now + Math.max(0.01, seconds));
          voice.source.stop(now + Math.max(0.02, seconds + 0.04));
        } catch (_) {}
      });
    }

    function selectPianoNoteIndex() {
      if (pianoNoteBuffers.length < 2) return 0;
      let index = Math.floor(Math.random() * pianoNoteBuffers.length);
      if (index === lastPianoNoteIndex) {
        index = (index + 1 + Math.floor(Math.random() * (pianoNoteBuffers.length - 1))) % pianoNoteBuffers.length;
      }
      lastPianoNoteIndex = index;
      return index;
    }

    function playToolPianoNote() {
      if (!audioContext || !thinkingMasterGain || !pianoNoteBuffers.length) return;
      const now = audioContext.currentTime;
      const buffer = pianoNoteBuffers[selectPianoNoteIndex()];
      const source = audioContext.createBufferSource();
      const output = audioContext.createGain();
      const duration = Math.min(buffer.duration, PIANO_NOTE_MAX_SECONDS);
      source.buffer = buffer;
      output.gain.setValueAtTime(PIANO_NOTE_VOLUME, now);
      output.gain.setValueAtTime(PIANO_NOTE_VOLUME, now + Math.min(0.85, duration * 0.45));
      output.gain.exponentialRampToValueAtTime(0.0001, now + Math.max(0.25, duration));
      source.connect(output);
      output.connect(thinkingMasterGain);
      const voice = { source, gain: output };
      activePianoVoices.push(voice);
      source.onended = () => {
        activePianoVoices = activePianoVoices.filter((item) => item !== voice);
        try {
          output.disconnect();
        } catch (_) {}
      };
      source.start(now);
      source.stop(now + duration + 0.03);
    }

    async function cueToolSound(visualCue) {
      try {
        await warmFeedbackAudio();
        if (!thinkingPulseActive && currentState === 'thinking') {
          await startThinkingSound();
        }
        activateToolThinkingLayer();
        playToolPianoNote();
      } catch (err) {
        log(`Tool sound blocked: ${err.message || err}`);
      }
    }

    async function startThinkingSound() {
      if (thinkingPulseActive) return;
      thinkingPulseActive = true;
      try {
        const layers = await warmFeedbackAudio();
        if (!thinkingPulseActive || !layers.length) return;
        rampGain(thinkingMasterGain, THINKING_MASTER_VOLUME, 0.12);
        thinkingLayerOrder = shuffleIndexes(layers.length);
        thinkingLayerCursor = 0;
        firstToolLayerAt = 0;
        startSyncedThinkingSources();
        activateNextThinkingLayer();
      } catch (err) {
        log(`Thinking sound blocked: ${err.message || err}`);
      }
    }

    function stopThinkingSound() {
      thinkingPulseActive = false;
      thinkingLayerCursor = 0;
      thinkingLayerOrder = [];
      firstToolLayerAt = 0;
      if (thinkingMasterGain) {
        rampGain(thinkingMasterGain, 0, THINKING_FADE_OUT_SECONDS);
      }
      fadeOutPianoVoices(THINKING_FADE_OUT_SECONDS);
      thinkingLayers.forEach((layer) => {
        rampGain(layer.gain, 0, THINKING_FADE_OUT_SECONDS);
        layer.active = false;
        layer.generation += 1;
        clearLayerTimers(layer);
        stopLayerSources(layer, THINKING_FADE_OUT_SECONDS + 0.04);
      });
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);

    function averageFrequencyBand(data, analyser, lowHz, highHz) {
      const nyquist = analyser.context.sampleRate / 2;
      const start = Math.max(0, Math.floor((lowHz / nyquist) * data.length));
      const end = Math.min(data.length - 1, Math.ceil((highHz / nyquist) * data.length));
      if (end < start) return 0;
      let sum = 0;
      for (let i = start; i <= end; i += 1) {
        sum += data[i];
      }
      return sum / ((end - start + 1) * 255);
    }

    function extractVisualCues(text) {
      const source = ` ${String(text || '').toLowerCase()} `;
      const cues = [];
      const add = (kind, value, priority = 5) => {
        const key = `${kind}:${value}`;
        if (!cues.some((cue) => cue.key === key)) {
          cues.push({ kind, value, priority, key });
        }
      };

      if (/\b(calendar|agenda|schedule|appointment|meeting|event)\b/.test(source)) add('icon', 'calendar', 1);
      if (/\b(flight|airport|plane|boarding|depart|arrival|trip|travel)\b/.test(source)) add('icon', 'plane', 2);
      if (/\b(location|where|map|address|gps|tracker)\b/.test(source)) add('icon', 'pin', 2);
      if (/\b(home|house|garage|room)\b/.test(source)) add('icon', 'home', 3);
      if (/\b(weather|rain|storm|cloud|temperature|forecast)\b/.test(source)) add('icon', 'cloud', 2);
      if (/\b(sun|sunny|clear)\b/.test(source)) add('icon', 'sun', 3);
      if (/\b(email|mail|inbox|message)\b/.test(source)) add('icon', 'mail', 2);
      if (/\b(warning|error|down|failed|unreachable|offline|attention)\b/.test(source)) add('icon', 'alert', 1);
      if (/\b(music|song|playlist|album|artist)\b/.test(source)) add('icon', 'music', 3);
      if (/\b(file|folder|document|vault|note)\b/.test(source)) add('icon', 'file', 3);
      if (/\b(done|complete|success|ok|healthy|fixed)\b/.test(source)) add('icon', 'check', 4);
      if (/\b(time|later|soon|today|tomorrow|tonight)\b/.test(source)) add('icon', 'clock', 4);
      if (/\b(phone|iphone|call)\b/.test(source)) add('icon', 'phone', 3);

      const dateNumber = source.match(/\b(?:april|may|june|july|august|september|october|november|december|january|february|march)\s+([0-3]?\d)\b/)
        || source.match(/\b([0-3]?\d)(?:st|nd|rd|th)\b/)
        || source.match(/\b(?:date|day)\s+([0-3]?\d)\b/);
      if (dateNumber) add('text', dateNumber[1].replace(/^0/, ''), 2);

      return cues.sort((a, b) => a.priority - b.priority).slice(0, 4);
