    function visualCueForTool(data) {
      const name = String(data.name || data.tool || '').toLowerCase();
      const emoji = String(data.emoji || data.value || data.icon || '').trim();
      const source = `${name} ${emoji}`;
      const match = (patterns) => patterns.some((pattern) => source.includes(pattern));
      if (match(['calendar', 'event', 'agenda'])) return { kind: 'icon', value: 'calendar', emoji };
      if (match(['web', 'search', 'browser', '🔎', '🔍'])) return { kind: 'icon', value: 'search', emoji };
      if (match(['terminal', 'shell', 'exec', 'command', 'python', 'code', '💻', '🐍'])) return { kind: 'icon', value: 'terminal', emoji };
      if (match(['file', 'vault', 'note', 'document', 'patch', 'read_', 'write_', '📄', '📖', '✍'])) return { kind: 'icon', value: 'file', emoji };
      if (match(['home_assistant', 'hass', 'location', 'device_tracker', '🏠'])) return { kind: 'icon', value: 'home', emoji };
      if (match(['cron', 'schedule', 'job', '⏱', '⏰'])) return { kind: 'icon', value: 'clock', emoji };
      if (match(['mail', 'email', 'gmail', 'inbox', '✉'])) return { kind: 'icon', value: 'mail', emoji };
      if (match(['weather', 'forecast', '🌤', '☀'])) return { kind: 'icon', value: 'cloud', emoji };
      if (match(['discord', 'message', 'chat', '💬'])) return { kind: 'icon', value: 'message', emoji };
      if (match(['music', 'spotify', 'playlist', '🎵'])) return { kind: 'icon', value: 'music', emoji };
      return { kind: 'icon', value: 'tool', emoji };
    }

    function titleCaseWords(value) {
      return value
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .split(' ')
        .filter(Boolean)
        .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    }

    function truncateMiddle(value, maxLength = 72) {
      const text = String(value || '').replace(/\s+/g, ' ').trim();
      if (text.length <= maxLength) return text;
      const keep = Math.max(10, Math.floor((maxLength - 1) / 2));
      return `${text.slice(0, keep)}…${text.slice(-keep)}`;
    }

    function fileNameFromPath(value) {
      const clean = String(value || '').replace(/^['"]|['"]$/g, '');
      const parts = clean.split(/[\\/]/).filter(Boolean);
      return parts[parts.length - 1] || clean;
    }

    function conciseToolDetail(value) {
      const text = String(value || '').replace(/\s+/g, ' ').trim();
      if (!text) return '';

      const urlMatch = text.match(/https?:\/\/[^\s"'<>]+/i);
      if (urlMatch) {
        try {
          const url = new URL(urlMatch[0]);
          const path = url.pathname && url.pathname !== '/' ? url.pathname.replace(/\/$/, '') : '';
          return truncateMiddle(`${url.hostname}${path}`, 72);
        } catch {
          return truncateMiddle(urlMatch[0].replace(/^https?:\/\//i, ''), 72);
        }
      }

      const firstCommand = text.split('|')[0].trim();
      const scriptMatch = firstCommand.match(/(?:^|\s)(['"]?(?:\/[^\s'"]+|\.{1,2}\/[^\s'"]+|[A-Za-z0-9_.-]+)\.(?:py|js|ts|mjs|cjs|sh|zsh|bash|rb|pl|php|swift|go|rs)['"]?)/i);
      if (scriptMatch) return fileNameFromPath(scriptMatch[1]);

      const pathMatch = firstCommand.match(/(?:^|\s)(['"]?(?:\/[^\s'"]+|\.{1,2}\/[^\s'"]+)['"]?)/);
      if (pathMatch) return fileNameFromPath(pathMatch[1]);

      const quoted = text.match(/["']([^"']{4,90})["']/);
      if (quoted) return truncateMiddle(quoted[1], 72);

      return truncateMiddle(text, 72);
    }

    function toolReadoutTitle(data, visualCue) {
      const rawName = String(data.name || data.tool || '').trim();
      const source = `${rawName} ${visualCue.value || ''}`.toLowerCase();
      if (source.includes('calendar') || source.includes('agenda')) return 'Calendar';
      if (source.includes('web') || source.includes('search') || source.includes('browser')) return 'Web Search';
      if (source.includes('terminal') || source.includes('shell') || source.includes('exec') || source.includes('command')) return 'Terminal';
      if (source.includes('python')) return 'Python';
      if (source.includes('cron') || source.includes('schedule')) return 'Cron Job';
      if (source.includes('home_assistant') || source.includes('hass') || source.includes('device_tracker')) return 'Home Assistant';
      if (source.includes('mail') || source.includes('email') || source.includes('gmail')) return 'Email';
      if (source.includes('weather') || source.includes('forecast')) return 'Weather';
      if (source.includes('discord') || source.includes('message') || source.includes('chat')) return 'Messages';
      if (source.includes('file') || source.includes('vault') || source.includes('document')) return 'Files';
      return titleCaseWords(rawName || 'Tool');
    }

    function toolReadoutSubtitle(data, title) {
      const rawName = String(data.name || data.tool || '').trim();
      const candidates = [
        data.label,
        data.preview,
        data.query,
        data.url,
        data.command,
      ];
      const detail = candidates
        .map((value) => String(value || '').replace(/\s+/g, ' ').trim())
        .find((value) => value && value.toLowerCase() !== rawName.toLowerCase() && value.toLowerCase() !== title.toLowerCase());
      return conciseToolDetail(detail);
    }

    function showToolReadout(data, visualCue) {
      if (currentState !== 'thinking') return;
      const title = toolReadoutTitle(data, visualCue);
      const subtitle = toolReadoutSubtitle(data, title);
      toolReadoutQueue.push({ title, subtitle });
      toolReadoutQueue = toolReadoutQueue.slice(-12);
      playNextToolReadout();
    }

    function redactToolTickerValue(key, value) {
      const lowerKey = String(key || '').toLowerCase();
      if (/(secret|token|password|passwd|credential|authorization|apikey|api_key|key)/.test(lowerKey)) {
        return '[redacted]';
      }
      if (value == null) return '';
      if (typeof value === 'string') {
        return value
          .replace(/(sk-[A-Za-z0-9_-]{12,})/g, '[redacted]')
          .replace(/([A-Za-z0-9_-]{24,}\.[A-Za-z0-9_-]{12,}\.[A-Za-z0-9_-]{12,})/g, '[redacted]');
      }
      if (typeof value === 'number' || typeof value === 'boolean') return String(value);
      if (Array.isArray(value)) return value.slice(0, 4).map((item) => redactToolTickerValue(key, item)).join(',');
      if (typeof value === 'object') {
        return Object.entries(value)
          .slice(0, 8)
          .map(([childKey, childValue]) => `${childKey}:${redactToolTickerValue(childKey, childValue)}`)
          .join(',');
      }
      return String(value);
    }

    function compactToolTickerField(key, value) {
      const clean = redactToolTickerValue(key, value).replace(/\s+/g, ' ').trim();
      if (!clean) return '';
      return `${String(key).toUpperCase()}=${truncateMiddle(clean, 96)}`;
    }

    function toolTickerText(data, visualCue) {
      const name = String(data.name || data.tool || visualCue.value || 'tool').replace(/\s+/g, '_');
      const stage = String(data.stage || 'started').replace(/\s+/g, '_');
      const label = String(data.label || data.preview || data.query || data.command || data.url || '').trim();
      const timestamp = formatTime(data.at || Date.now() / 1000).replace(/\s+/g, '');
      const fields = [
        `HERMES-VOICE`,
        `TOOLCALL`,
        `TRACE=${String(++toolTickerId).padStart(4, '0')}`,
        `STAGE=${stage}`,
        `NAME=${name}`,
        `KIND=${visualCue.value || visualCue.kind || 'tool'}`,
        label ? compactToolTickerField('label', label) : '',
        compactToolTickerField('provider', data.provider),
        compactToolTickerField('status', data.status),
        `AT=${timestamp}`,
      ].filter(Boolean);
      const extras = Object.entries(data)
        .filter(([key]) => !['type', 'kind', 'emoji', 'icon', 'name', 'tool', 'stage', 'label', 'preview', 'query', 'command', 'url', 'at'].includes(key))
        .map(([key, value]) => compactToolTickerField(key, value))
        .filter(Boolean)
        .slice(0, 5);
      const stream = fields.concat(extras).join('  ::  ');
      return `${stream}  ///  ${stream}`;
    }

    function renderToolTickerCanvas(tokens) {
      const fontSize = Math.max(13, Math.min(22, width * 0.016));
      const gap = fontSize * 0.52;
      const paddingX = Math.ceil(fontSize * 1.5);
      const paddingY = Math.ceil(fontSize * 1.3);
      const scratch = document.createElement('canvas');
      const scratchCtx = scratch.getContext('2d');
      const font = `800 ${fontSize}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace`;
      scratchCtx.font = font;
      const measuredTokens = tokens.map((token) => ({
        ...token,
        width: scratchCtx.measureText(token.text).width,
      }));
      const cssWidth = Math.min(
        9000,
        Math.ceil(measuredTokens.reduce((sum, token) => sum + token.width + gap, paddingX * 2)),
      );
      const cssHeight = Math.ceil(fontSize * 2.55 + paddingY);
      const scale = Math.min(window.devicePixelRatio || 1, 1.25);
      const bitmap = document.createElement('canvas');
      bitmap.width = Math.max(1, Math.ceil(cssWidth * scale));
      bitmap.height = Math.max(1, Math.ceil(cssHeight * scale));
      bitmap.style.width = `${cssWidth}px`;
      bitmap.style.height = `${cssHeight}px`;
      const bitmapCtx = bitmap.getContext('2d');
      bitmapCtx.setTransform(scale, 0, 0, scale, 0, 0);
      bitmapCtx.font = font;
      bitmapCtx.textBaseline = 'middle';
      bitmapCtx.globalCompositeOperation = 'lighter';

      let cursor = paddingX;
      const y = cssHeight / 2;
      const tickerColors = currentPalette.ticker;
      for (const token of measuredTokens) {
        if (cursor > cssWidth - paddingX) break;
        if (token.tone === 'hot') {
          bitmapCtx.fillStyle = rgbaColor(tickerColors.hot, 0.98);
          bitmapCtx.shadowBlur = 18;
          bitmapCtx.shadowColor = rgbaColor(tickerColors.normal, 0.72);
        } else if (token.tone === 'strong') {
          bitmapCtx.fillStyle = rgbaColor(tickerColors.strong, 0.9);
          bitmapCtx.shadowBlur = 10;
          bitmapCtx.shadowColor = rgbaColor(tickerColors.normal, 0.48);
        } else if (token.tone === 'dim') {
          bitmapCtx.fillStyle = rgbaColor(tickerColors.dim, 0.42);
          bitmapCtx.shadowBlur = 6;
          bitmapCtx.shadowColor = rgbaColor(tickerColors.normal, 0.3);
        } else {
          bitmapCtx.fillStyle = rgbaColor(tickerColors.normal, 0.72);
          bitmapCtx.shadowBlur = 8;
          bitmapCtx.shadowColor = rgbaColor(tickerColors.normal, 0.36);
        }
        bitmapCtx.fillText(token.text, cursor, y);
        cursor += token.width + gap;
      }
      return { bitmap, width: cssWidth, height: cssHeight };
    }

    function spawnToolTicker(data, visualCue) {
      const top = 10 + Math.random() * 74;
      const duration = reducedMotion ? 18 : 7.5 + Math.random() * 4.5;
      const important = new Set(['HERMES-VOICE', 'TOOLCALL', 'STAGE', 'NAME', 'KIND', 'LABEL', 'COMMAND', 'QUERY', 'URL']);
      const tokens = toolTickerText(data, visualCue).split(/\s+/).filter(Boolean).slice(0, 96);
      const renderedTokens = tokens.map((token, index) => {
        const tokenKey = token.split('=')[0].replace(/[:/]/g, '').toUpperCase();
        const normalized = token.toUpperCase();
        if (index % 17 === 0 || important.has(tokenKey) || normalized.includes(String(data.name || data.tool || '').toUpperCase())) {
          return { text: token, tone: 'hot' };
        }
        if (index % 5 === 0 || normalized.includes('TRACE=') || normalized.includes('STAGE=')) {
          return { text: token, tone: 'strong' };
        }
        if (index % 7 === 0 || token === '::' || token === '///') {
          return { text: token, tone: 'dim' };
        }
        return { text: token, tone: 'normal' };
      });
      const renderedLine = renderToolTickerCanvas(renderedTokens);

      activeToolTickers.push({
        ...renderedLine,
        topRatio: top / 100,
        startedAt: performance.now(),
        durationMs: duration * 1000,
      });
      activeToolTickers = activeToolTickers.slice(-12);
    }

    function playNextToolReadout() {
      if (toolReadoutActive) return;
      if (currentState !== 'thinking') {
        clearToolReadout();
        return;
      }
      const next = toolReadoutQueue.shift();
      if (!next) {
        clearToolReadout(false);
        return;
      }
      const cueId = toolReadoutId + 1;
      toolReadoutId = cueId;
      toolReadoutActive = true;
      window.clearTimeout(toolReadoutTimer);
      stateLabelEl.textContent = next.title;
      stateDetailEl.textContent = next.subtitle;
      setTopDetail(next.subtitle || next.title);
      readoutEl.classList.remove('tool-cue');
      void readoutEl.offsetWidth;
      readoutEl.classList.add('tool-cue');
      toolReadoutTimer = window.setTimeout(() => {
        if (toolReadoutId !== cueId) return;
        toolReadoutActive = false;
        readoutEl.classList.remove('tool-cue');
        stateLabelEl.textContent = '';
        stateDetailEl.textContent = '';
        setTopDetail();
        if (currentState === 'thinking') {
          window.setTimeout(playNextToolReadout, 80);
        } else {
          clearToolReadout();
        }
      }, TOOL_READOUT_MS);
    }

    function buildVisualCue(kind, value) {
      const size = 360;
      visualMaskCanvas.width = size;
      visualMaskCanvas.height = size;
      visualMaskCtx.clearRect(0, 0, size, size);
      visualMaskCtx.save();
      visualMaskCtx.translate(0, 0);
      if (kind === 'emoji') {
        visualMaskCtx.fillStyle = '#fff';
        visualMaskCtx.textAlign = 'center';
        visualMaskCtx.textBaseline = 'middle';
        visualMaskCtx.font = '220px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif';
        visualMaskCtx.fillText(String(value).slice(0, 4), size / 2, size / 2 + 10);
      } else if (kind === 'text') {
        visualMaskCtx.fillStyle = '#fff';
        visualMaskCtx.textAlign = 'center';
        visualMaskCtx.textBaseline = 'middle';
        visualMaskCtx.font = `800 ${value.length > 2 ? 150 : 210}px Inter, system-ui, sans-serif`;
        visualMaskCtx.fillText(String(value).slice(0, 4), size / 2, size / 2 + 8);
      } else {
        drawCueIcon(visualMaskCtx, value, size);
      }
      visualMaskCtx.restore();

      const image = visualMaskCtx.getImageData(0, 0, size, size).data;
      const points = [];
      const step = kind === 'emoji' ? 5 : 4;
      for (let y = 0; y < size; y += step) {
        for (let x = 0; x < size; x += step) {
          const alpha = image[((y * size + x) * 4) + 3];
          if (alpha > 18) {
            points.push({ x: (x / size) - 0.5, y: (y / size) - 0.5 });
          }
        }
      }
      if (!points.length) return null;
      return { kind, value, points };
    }

    function queueVisualCue(kind, value) {
      const safeKind = kind === 'emoji' ? 'emoji' : kind === 'text' ? 'text' : 'icon';
      const safeValue = String(value || '').trim();
      if (!safeValue) return;
      const now = performance.now();
      const key = `${safeKind}:${safeValue}`;
      if (key === lastVisualCueKey && now - lastVisualCueAt < 700) return;
      const built = buildVisualCue(safeKind, safeValue);
      if (!built) return;
      lastVisualCueKey = key;
      lastVisualCueAt = now;
      visualCueQueue.push(built);
      visualCueQueue = visualCueQueue.slice(-5);
      if (!activeVisualCue) {
        visualCueStartedAt = 0;
        visualCuePeak = 0;
      }
    }

    function queueVisualCuesFromText(text) {
      const cues = extractVisualCues(text);
      if (!cues.length) return;
      const key = cues.map((cue) => cue.key).join('|');
      const now = performance.now();
      if (key === lastVisualCueKey && now - lastVisualCueAt < 1200) return;
      lastVisualCueKey = key;
      lastVisualCueAt = now;
      const built = cues.map((cue) => buildVisualCue(cue.kind, cue.value)).filter(Boolean);
      if (built.length) {
        visualCueQueue = built;
        activeVisualCue = null;
        visualCueStartedAt = 0;
      }
    }

    function shouldShowVisualCue() {
      if (reducedMotion || (!visualCueQueue.length && !activeVisualCue)) return false;
      return currentState === 'thinking';
    }

    const cueTiming = {
      gather: 175,
      hold: 1120,
      release: 175,
    };
    cueTiming.total = cueTiming.gather + cueTiming.hold + cueTiming.release;

    function clamp01(value) {
      return Math.max(0, Math.min(1, value));
    }

    function accelerateIn(t) {
      return Math.pow(clamp01(t), 2.6);
    }

    function cuePhase(elapsed) {
      if (elapsed < cueTiming.gather) {
        return {
          name: 'gather',
          progress: clamp01(elapsed / cueTiming.gather),
          influence: 0.08 + accelerateIn(elapsed / cueTiming.gather) * 0.92,
        };
      }
      if (elapsed < cueTiming.gather + cueTiming.hold) {
        return {
          name: 'hold',
          progress: clamp01((elapsed - cueTiming.gather) / cueTiming.hold),
          influence: 1,
        };
      }
      const releaseElapsed = elapsed - cueTiming.gather - cueTiming.hold;
      return {
        name: 'release',
        progress: clamp01(releaseElapsed / cueTiming.release),
        influence: accelerateIn(1 - (releaseElapsed / cueTiming.release)),
      };
    }

    function currentShapeTarget(particle, now) {
      if (!shouldShowVisualCue()) {
        activeVisualCue = null;
        return null;
      }
      if (!activeVisualCue || now - visualCueStartedAt > cueTiming.total) {
        const next = visualCueQueue.shift();
        if (!next) {
          activeVisualCue = null;
          return null;
        }
        activeVisualCue = next;
        visualCueStartedAt = now;
        visualCuePeak = 0;
      }
      const elapsed = now - visualCueStartedAt;
      const phase = cuePhase(elapsed);
      const influence = phase.influence;
      visualCuePeak = Math.max(visualCuePeak, influence);
      if (influence <= 0.02) return null;

      if (phase.name === 'gather') {
        return {
          x: width * 0.5,
          y: height * 0.42,
          influence,
        };
      }

      const points = activeVisualCue.points;
      const point = points[Math.floor((particle.seed * 997 + particle.index * 17) % points.length)];
      const scale = Math.min(width, height) * (activeVisualCue.kind === 'text' ? 0.66 : 0.58);
      return {
        x: (width * 0.5) + (point.x * scale) + Math.sin(now * 0.004 + particle.seed) * 1.5,
        y: (height * 0.42) + (point.y * scale) + Math.cos(now * 0.003 + particle.seed) * 1.5,
        influence,
      };
    }

    function getErrorShapePoints() {
      if (errorShapePoints) return errorShapePoints;
      const size = 360;
      visualMaskCanvas.width = size;
      visualMaskCanvas.height = size;
      visualMaskCtx.clearRect(0, 0, size, size);
      visualMaskCtx.save();
      visualMaskCtx.translate(size / 2, size / 2);
      visualMaskCtx.fillStyle = '#fff';
      visualMaskCtx.strokeStyle = '#fff';
      visualMaskCtx.lineCap = 'round';
      visualMaskCtx.lineJoin = 'round';

      visualMaskCtx.lineWidth = 32;
      visualMaskCtx.beginPath();
      visualMaskCtx.moveTo(-118, 104);
      visualMaskCtx.lineTo(118, -104);
      visualMaskCtx.moveTo(118, 104);
      visualMaskCtx.lineTo(-118, -104);
      visualMaskCtx.stroke();

      for (const sx of [-1, 1]) {
        for (const sy of [-1, 1]) {
          visualMaskCtx.beginPath();
          visualMaskCtx.arc(sx * 132, sy * 118, 18, 0, TAU);
          visualMaskCtx.fill();
        }
      }

      visualMaskCtx.beginPath();
      visualMaskCtx.ellipse(0, -24, 82, 92, 0, 0, TAU);
      visualMaskCtx.fill();
      visualMaskCtx.fillRect(-50, 44, 100, 72);
      visualMaskCtx.fillRect(-38, 96, 76, 32);

      visualMaskCtx.globalCompositeOperation = 'destination-out';
      visualMaskCtx.beginPath();
      visualMaskCtx.ellipse(-32, -30, 23, 31, -0.25, 0, TAU);
      visualMaskCtx.ellipse(32, -30, 23, 31, 0.25, 0, TAU);
      visualMaskCtx.fill();
      visualMaskCtx.beginPath();
      visualMaskCtx.moveTo(0, -4);
      visualMaskCtx.lineTo(-16, 28);
      visualMaskCtx.lineTo(16, 28);
      visualMaskCtx.closePath();
      visualMaskCtx.fill();
      for (let x = -30; x <= 30; x += 20) {
        visualMaskCtx.fillRect(x - 5, 70, 10, 42);
      }
      visualMaskCtx.restore();

      const image = visualMaskCtx.getImageData(0, 0, size, size).data;
      const points = [];
      for (let y = 0; y < size; y += 4) {
        for (let x = 0; x < size; x += 4) {
          const alpha = image[((y * size + x) * 4) + 3];
          if (alpha > 18) points.push({ x: (x / size) - 0.5, y: (y / size) - 0.5 });
        }
      }
      errorShapePoints = points;
      return errorShapePoints;
    }

    function errorShapeTarget(particle, now) {
      const points = getErrorShapePoints();
      if (!points.length) return null;
      const point = points[Math.floor((particle.seed * 997 + particle.index * 17) % points.length)];
      const scale = Math.min(width, height) * (isMobile ? 0.68 : 0.6);
      return {
        x: (width * 0.5) + (point.x * scale) + Math.sin(now * 0.0035 + particle.seed) * 1.2,
        y: (height * 0.42) + (point.y * scale) + Math.cos(now * 0.003 + particle.seed) * 1.2,
        influence: 0.94,
      };
    }

    function blendTargets(base, shape) {
      if (!shape) return base;
      const influence = Math.min(1, shape.influence * 1.12);
      return {
        x: base.x + (shape.x - base.x) * influence,
        y: base.y + (shape.y - base.y) * influence,
      };
    }

    function makeTriangleHomePoint() {
      const vertices = [
        { x: 0, y: -0.98 },
        { x: 0.92, y: 0.72 },
        { x: -0.92, y: 0.72 },
      ];
      if (Math.random() < 0.62) {
        const edge = Math.floor(Math.random() * 3);
        const a = vertices[edge];
        const b = vertices[(edge + 1) % vertices.length];
        const t = Math.random();
        const feather = Math.pow(Math.random(), 2.2) * 0.13;
        return {
          x: a.x + (b.x - a.x) * t,
          y: a.y + (b.y - a.y) * t + feather,
        };
      }

      let u = Math.random();
      let v = Math.random();
      if (u + v > 1) {
        u = 1 - u;
        v = 1 - v;
      }
      const a = vertices[0];
      const b = vertices[1];
      const c = vertices[2];
      return {
        x: a.x + u * (b.x - a.x) + v * (c.x - a.x),
        y: a.y + u * (b.y - a.y) + v * (c.y - a.y),
      };
    }

    function resize() {
      dpr = Math.min(isMobile ? 1.35 : 1.5, window.devicePixelRatio || 1);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      particles = [];
      seedParticles();
    }

    function seedParticles() {
      const old = particles;
      const centerX = width * 0.5;
      const centerY = height * 0.45;
      const radius = Math.min(width, height) * (isMobile ? 0.27 : 0.24);
      particles = Array.from({ length: particleCount }, (_, index) => {
        const previous = old[index];
        const ring = Math.sqrt(Math.random());
        const angle = Math.random() * TAU;
        const triangleHome = previous ? { x: previous.homeTriX, y: previous.homeTriY } : makeTriangleHomePoint();
        const x = previous ? previous.x : centerX + Math.cos(angle) * radius * ring;
        const y = previous ? previous.y : centerY + Math.sin(angle) * radius * ring;
        return {
          x,
          y,
          vx: previous ? previous.vx : rand(-0.4, 0.4),
          vy: previous ? previous.vy : rand(-0.4, 0.4),
          seed: Math.random() * 1000,
          index,
          homeAngle: angle,
          homeRadius: radius * ring,
          homeTriX: triangleHome.x,
          homeTriY: triangleHome.y,
          depth: rand(0.45, 1),
          size: rand(0.75, 1.95),
        };
      });
    }

    function statePhysics(state) {
      if (state === 'thinking') {
        return { spring: 0.018, damping: 0.9, wander: 1.8, scatter: 1 };
      }
      if (state === 'speaking') {
        return { spring: 0.09, damping: 0.76, wander: 0.65, scatter: 0.08 };
      }
      if (state === 'connecting' || state === 'starting') {
        return { spring: 0.035, damping: 0.86, wander: 0.55, scatter: 0.18 };
      }
      if (state === 'error' || state === 'disconnected') {
        return { spring: 0.026, damping: 0.88, wander: 0.38, scatter: 0.42 };
      }
      return { spring: 0.052, damping: 0.84, wander: 0.28, scatter: 0 };
    }

    function particleTarget(particle, now, audioEnergy) {
      const cx = width * 0.5;
      const cy = height * 0.45;
      const minSide = Math.min(width, height);
      const baseRadius = minSide * (isMobile ? 0.265 : 0.235);
      const speaking = currentState === 'speaking';
      const speechLow = speaking ? remoteBands.low : 0;
      const speechMid = speaking ? remoteBands.mid : 0;
      const speechHigh = speaking ? remoteBands.high : 0;
      const speechTransient = speaking ? remoteBands.transient : 0;
      const audioPulse = 1 + audioEnergy * (speaking ? 0.26 : 0.28);
      const breathing = 1 + Math.sin(now * 0.0014 + particle.seed) * 0.018;
      const angle = particle.homeAngle + spin * (0.12 + particle.depth * 0.18);
      let radius = particle.homeRadius * (baseRadius / Math.max(1, minSide * (isMobile ? 0.27 : 0.24)));
      radius *= breathing * audioPulse;
      const triangleScale = minSide * (isMobile ? 0.285 : 0.255);
      const triangleLean = Math.sin(now * 0.00065 + particle.seed) * 0.018;
      const trianglePulse = speaking ? 1 + speechLow * 0.055 + audioEnergy * 0.07 : breathing * (1 + audioEnergy * 0.08);
      const triangleAngle = Math.atan2(particle.homeTriY, particle.homeTriX);
      const triangleDistance = Math.hypot(particle.homeTriX, particle.homeTriY);
      const triangleOutward = speaking
        ? 1 + speechLow * (0.035 + particle.depth * 0.075) + speechMid * Math.sin(now * 0.008 + particle.seed) * 0.026
        : 1;

      if (speaking) {
        const speechWave = Math.sin(now * 0.0085 - particle.homeRadius * 0.018 + particle.seed * 0.42);
        const vowelPush = speechLow * (0.05 + particle.depth * 0.06);
        const syllablePush = speechMid * speechWave * (0.045 + particle.depth * 0.045);
        const consonantPush = speechTransient * (0.045 + particle.depth * 0.045);
        radius *= 0.78 + particle.depth * 0.18 + vowelPush + syllablePush + consonantPush;
      } else if (currentState === 'connecting' || currentState === 'starting') {
        radius *= 1.08 + 0.08 * Math.sin(now * 0.001 + particle.seed);
      } else if (currentState === 'error' || currentState === 'disconnected') {
        radius *= 1.22 + 0.12 * Math.sin(now * 0.0012 + particle.seed);
      }

      if (currentState === 'thinking') {
        const shape = currentShapeTarget(particle, now);
        if (shape) {
          const t = now * 0.00055;
          const spreadAngle = particle.homeAngle + Math.sin(particle.seed * 0.017) * TAU + spin * (0.05 + particle.depth * 0.08);
          const spreadRadius = minSide * (isMobile ? 0.34 : 0.32) * (0.58 + particle.depth * 0.5);
          const drift = Math.sin(t * 3.2 + particle.seed) * minSide * 0.035;
          const base = {
            x: cx + Math.cos(spreadAngle + t * (0.9 + particle.depth)) * spreadRadius + Math.cos(particle.seed + t * 5) * drift,
            y: cy + Math.sin(spreadAngle * 1.13 + t * (1.1 + particle.depth)) * spreadRadius * 0.74 + Math.sin(particle.seed + t * 4) * drift,
          };
          return blendTargets(base, shape);
        }

        const t = now * 0.00055;
        const independentAngle = particle.homeAngle
          + spin * (0.05 + particle.depth * 0.1)
          + Math.sin(t * (0.9 + particle.depth * 0.7) + particle.seed) * 0.9;
        const radiusWave = 0.78 + Math.sin(t * 2.7 + particle.seed * 1.31) * 0.22;
        const independentRadius = minSide * (isMobile ? 0.34 : 0.31) * (0.42 + particle.depth * 0.62) * radiusWave;
        const streamX = Math.sin(t * 7.1 + particle.seed * 2.7) * minSide * 0.075;
        const streamY = Math.cos(t * 6.3 + particle.seed * 3.1) * minSide * 0.052;
        const base = {
          x: cx + Math.cos(independentAngle) * independentRadius + streamX,
          y: cy + Math.sin(independentAngle * 1.11) * independentRadius * 0.72 + streamY,
        };
        return base;
      }

      const base = {
        x: cx + ((particle.homeTriX + triangleLean * particle.homeTriY) * triangleScale * trianglePulse * triangleOutward),
        y: cy + (particle.homeTriY * triangleScale * 0.94 * trianglePulse * triangleOutward),
      };
      if (speaking) {
        const jitter = minSide * (0.006 + audioEnergy * 0.009 + speechHigh * 0.014);
        const tangent = triangleAngle + Math.PI / 2;
        const articulation = minSide * (speechMid * 0.012 + speechHigh * 0.01 + speechTransient * 0.012) * particle.depth;
        const consonantRipple = speechTransient * minSide * 0.009 * Math.sin(now * 0.015 + triangleDistance * 8 + particle.seed);
        base.x += Math.sin(now * 0.006 + particle.seed * 1.9) * jitter;
        base.y += Math.cos(now * 0.007 + particle.seed * 1.4) * jitter;
        base.x += Math.cos(tangent + particle.seed) * articulation;
        base.y += Math.sin(tangent + particle.seed * 0.7) * articulation * 0.82;
        base.x += Math.cos(triangleAngle) * consonantRipple;
        base.y += Math.sin(triangleAngle) * consonantRipple * 0.85;
      }
      const shape = currentState === 'error'
        ? errorShapeTarget(particle, now)
        : currentShapeTarget(particle, now);
      return blendTargets(base, shape);
    }

    function drawBackground(now) {
      ctx.fillStyle = '#020303';
      ctx.fillRect(0, 0, width, height);
      if (currentState === 'thinking') {
        ctx.fillStyle = `rgba(${currentPalette.background.join(', ')}, ${0.035 + 0.02 * Math.sin(now * 0.003)})`;
        ctx.fillRect(0, 0, width, height);
      } else if (currentState === 'speaking') {
        const speechGlow = Math.max(remoteBands.low * 0.55, remoteBands.mid * 0.42, remoteBands.high * 0.34, remoteBands.transient * 0.6);
        ctx.fillStyle = `rgba(${currentPalette.speakingGlow.join(', ')}, ${0.012 + Math.min(0.045, speechGlow * 0.055)})`;
        ctx.fillRect(0, 0, width, height);
      }
    }

    function drawToolTickers(now) {
      if (!activeToolTickers.length) return;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';

      activeToolTickers = activeToolTickers.filter((ticker) => {
        const progress = Math.min(1, Math.max(0, (now - ticker.startedAt) / ticker.durationMs));
        if (progress >= 1) return false;
        const y = Math.max(24, Math.min(height - 24, ticker.topRatio * height));
        const x = (width + 24) + ((-ticker.width - 48 - width) * progress);
        const alpha = Math.min(0.95, Math.min(progress / 0.08, (1 - progress) / 0.14));
        ctx.globalAlpha = alpha;
        ctx.drawImage(ticker.bitmap, x, y - ticker.height / 2, ticker.width, ticker.height);
        return true;
      });
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function drawParticles(now) {
      const audioEnergy = Math.max(micLevel * 0.5, remoteLevel);
      const basePhysics = statePhysics(currentState);
      const cueMode = shouldShowVisualCue(now);
      const speakingMode = currentState === 'speaking' && !cueMode;
      const speechDrive = Math.max(
        displayAudioLevel,
        remoteBands.low * 0.7,
        remoteBands.mid * 0.95,
        remoteBands.high * 0.78,
        remoteBands.transient * 0.9,
      );
      const speakingEnergy = speakingMode ? Math.max(speechDrive, 0.14) : 0;
      const physics = cueMode
        ? {
            spring: 0.16,
            damping: 0.68,
            wander: basePhysics.wander * 0.26,
            scatter: basePhysics.scatter * 0.08,
          }
        : speakingMode
          ? {
              spring: basePhysics.spring + speakingEnergy * 0.095,
              damping: 0.73,
              wander: basePhysics.wander + 0.28 + speakingEnergy * 0.62,
              scatter: basePhysics.scatter + speakingEnergy * 0.055,
            }
        : basePhysics;
      let color = currentPalette.particles[currentState] || currentPalette.particles.default;
      if (speakingMode) {
        const push = Math.min(0.68, (remoteBands.low * 0.16) + (remoteBands.mid * 0.26) + (remoteBands.high * 0.18) + (remoteBands.transient * 0.34));
        color = mixRgb(currentPalette.particles.speaking, currentPalette.speakingPush, push);
      }

      displayAudioLevel += (audioEnergy - displayAudioLevel) * 0.12;
      meterEl.style.setProperty('--meter-level', `${Math.min(100, Math.round(Math.max(micLevel, remoteLevel) * 100))}%`);
      spin += currentState === 'thinking'
        ? 0.024
        : currentState === 'speaking'
          ? 0.018 + displayAudioLevel * 0.06
          : 0.006 + displayAudioLevel * 0.012;

      ctx.globalCompositeOperation = 'lighter';
      for (const particle of particles) {
        const target = particleTarget(particle, now, displayAudioLevel);
        const noiseX = Math.sin(now * 0.0017 + particle.seed) * physics.wander;
        const noiseY = Math.cos(now * 0.0013 + particle.seed * 1.7) * physics.wander;
        const scatterX = Math.sin(particle.seed * 2.1 + now * 0.0009) * width * 0.18 * physics.scatter;
        const scatterY = Math.cos(particle.seed * 1.8 + now * 0.0007) * height * 0.12 * physics.scatter;
        particle.vx += ((target.x + scatterX - particle.x) * physics.spring + noiseX) * particle.depth;
        particle.vy += ((target.y + scatterY - particle.y) * physics.spring + noiseY) * particle.depth;
        particle.vx *= physics.damping;
        particle.vy *= physics.damping;
        particle.x += particle.vx;
        particle.y += particle.vy;

        const speed = Math.min(1, Math.hypot(particle.vx, particle.vy) / 18);
        const alpha = 0.22
          + particle.depth * 0.58
          + displayAudioLevel * (speakingMode ? 0.38 : 0.25);
        const size = particle.size * (0.8
          + particle.depth * 1.15
          + (cueMode ? visualCuePeak * 0.34 : 0)
          + displayAudioLevel * (speakingMode ? 0.78 : 0.9)
          + (speakingMode ? (remoteBands.high * 0.42 + remoteBands.transient * 0.54) : 0));
        ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${Math.min(0.95, alpha)})`;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, size, 0, TAU);
        ctx.fill();

        if (currentState === 'thinking' && speed > 0.22 && !reducedMotion && !cueMode && particle.index % 2 === 0) {
          ctx.strokeStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${0.08 + speed * 0.16})`;
          ctx.lineWidth = Math.max(0.4, particle.size * 0.42);
          ctx.beginPath();
          ctx.moveTo(particle.x, particle.y);
          ctx.lineTo(particle.x - particle.vx * 1.7, particle.y - particle.vy * 1.7);
          ctx.stroke();
        }

        if (speakingMode && speed > 0.12 && !reducedMotion && particle.index % 2 === 0) {
          ctx.strokeStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${0.05 + speed * 0.12})`;
          ctx.lineWidth = Math.max(0.35, particle.size * 0.34);
          ctx.beginPath();
          ctx.moveTo(particle.x, particle.y);
          ctx.lineTo(particle.x - particle.vx * 1.9, particle.y - particle.vy * 1.9);
          ctx.stroke();
        }
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    function animate(now) {
      const delta = Math.min(32, now - lastFrame);
      lastFrame = now;
      if (delta > 0) {
        micLevel *= 0.94;
        remoteLevel *= 0.92;
      }
      drawBackground(now);
      drawToolTickers(now);
      drawParticles(now);
      requestAnimationFrame(animate);
    }

    function readAnalyser(analyser, onLevel, onBands) {
      const data = new Uint8Array(analyser.frequencyBinCount);
      let smoothedEnergy = 0;
      let active = true;
      const tick = () => {
        if (!active) return;
        analyser.getByteFrequencyData(data);
        let sum = 0;
        for (const value of data) sum += value;
        const level = Math.min(1, (sum / data.length) / 110);
        onLevel(level);
        if (onBands) {
          const low = Math.min(1, averageFrequencyBand(data, analyser, 80, 320) * 1.8);
          const mid = Math.min(1, averageFrequencyBand(data, analyser, 320, 2100) * 1.55);
          const high = Math.min(1, averageFrequencyBand(data, analyser, 2100, 7200) * 1.85);
          const energy = (low * 0.32) + (mid * 0.48) + (high * 0.2);
          const transient = Math.max(0, energy - smoothedEnergy) * 3.4;
          smoothedEnergy += (energy - smoothedEnergy) * 0.18;
          onBands({ low, mid, high, transient: Math.min(1, transient) });
        }
        requestAnimationFrame(tick);
      };
      tick();
      return () => {
        active = false;
      };
    }

    async function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new AudioContext();
        applyAudioContextOutput().catch((err) => {
          log(`Thinking audio output unavailable: ${err.message || err}`);
        });
      }
      if (audioContext.state === 'suspended') {
        await audioContext.resume();
      }
      return audioContext;
    }

    async function attachMicAnalyser(track) {
      try {
        if (micAnalyserStop) {
          micAnalyserStop();
          micAnalyserStop = null;
        }
        const context = await ensureAudioContext();
        const stream = new MediaStream([track.mediaStreamTrack]);
        const source = context.createMediaStreamSource(stream);
        const analyser = context.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        const stopReader = readAnalyser(analyser, (level) => {
          micLevel = Math.max(micLevel, level);
          detectVoiceInterrupt(level);
        });
        micAnalyserStop = () => {
          stopReader();
          try {
            source.disconnect();
          } catch (_) {}
        };
        analyserNodes.push({ source, analyser });
      } catch (err) {
        log(`Mic meter unavailable: ${err.message || err}`);
      }
    }

    function audioInputConstraints() {
      const constraints = {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      };
      if (selectedAudioInputId) {
        constraints.deviceId = { exact: selectedAudioInputId };
      }
      return constraints;
    }

    async function createMicrophoneTrack() {
      try {
        return await createLocalAudioTrack(audioInputConstraints());
      } catch (err) {
        if (!selectedAudioInputId) throw err;
        log(`Selected microphone unavailable, falling back to system default: ${err.message || err}`);
        selectedAudioInputId = '';
        localStorage.removeItem('hermes.audioInputId');
        renderAudioInputSelect();
        return createLocalAudioTrack(audioInputConstraints());
      }
    }

    async function publishMicrophone() {
      if (!room || room.state !== 'connected') return;
      const previousTrack = localAudioTrack;
      const wasMuted = muted;
      const nextTrack = await createMicrophoneTrack();
      if (previousTrack) {
        try {
          await room.localParticipant.unpublishTrack(previousTrack);
        } catch (err) {
          log(`Old microphone unpublish warning: ${err.message || err}`);
        }
      }
      localAudioTrack = nextTrack;
      await room.localParticipant.publishTrack(localAudioTrack);
      await attachMicAnalyser(localAudioTrack);
      if (wasMuted) {
        await setMicrophoneMuted(true);
      } else {
        updateMuteButton();
      }
      muteBtn.disabled = false;
      const label = localAudioTrack.mediaStreamTrack?.label || 'microphone';
      log(`Microphone input: ${label}`);
      await refreshAudioInputDevices();
    }

    async function switchAudioInput() {
      selectedAudioInputId = audioInputSelectEl.value || '';
      if (selectedAudioInputId) {
        localStorage.setItem('hermes.audioInputId', selectedAudioInputId);
      } else {
        localStorage.removeItem('hermes.audioInputId');
      }
      if (!room || room.state !== 'connected') {
        showToast('Audio input will be used on reconnect.');
        return;
      }
      audioInputSelectEl.disabled = true;
      try {
        await publishMicrophone();
        showToast('Audio input changed.');
      } catch (err) {
        if (selectedAudioInputId) {
          selectedAudioInputId = '';
          localStorage.removeItem('hermes.audioInputId');
          renderAudioInputSelect();
        }
        showToast('Audio input did not switch.');
        log(`MIC INPUT ERROR: ${err.message || err}`);
      } finally {
        audioInputSelectEl.disabled = false;
      }
    }

    function detectVoiceInterrupt(level) {
      if (!ENABLE_VOICE_BARGE_IN) {
        interruptStartedAt = 0;
        return;
      }
      if (currentState !== 'speaking' || muted || !room || !room.localParticipant) {
        interruptStartedAt = 0;
        return;
      }
      const now = performance.now();
      if (speakingStateStartedAt && now - speakingStateStartedAt < INTERRUPT_AFTER_SPEAKING_MS) {
        interruptStartedAt = 0;
        return;
      }
      const dynamicThreshold = Math.max(
        INTERRUPT_MIC_THRESHOLD,
        (remoteLevel * INTERRUPT_REMOTE_RATIO) + INTERRUPT_MIN_REMOTE_MARGIN,
      );
      const aboveVoice = level >= dynamicThreshold;
      if (!aboveVoice) {
        interruptStartedAt = 0;
        return;
      }
      if (!interruptStartedAt) {
        interruptStartedAt = now;
        return;
      }
      if (now - interruptStartedAt < INTERRUPT_HOLD_MS || now - lastInterruptAt < INTERRUPT_COOLDOWN_MS) {
        return;
      }
      lastInterruptAt = now;
      interruptStartedAt = 0;
      sendInterrupt('barge-in');
    }

    async function sendInterrupt(reason) {
      if (!room || !room.localParticipant) return;
      try {
        const payload = new TextEncoder().encode(JSON.stringify({
          type: 'interrupt',
          reason,
          at: Date.now() / 1000,
        }));
        await room.localParticipant.publishData(payload, {
          reliable: true,
          topic: 'hermes.control',
        });
        clearToolReadout();
      } catch (err) {
        log(`Interrupt failed: ${err.message || err}`);
      }
    }

    async function startLiveKitAudio() {
      if (room && typeof room.startAudio === 'function') {
        try {
          await room.startAudio();
        } catch (err) {
          log(`LiveKit audio unlock blocked: ${err.message || err}`);
        }
      }
      for (const element of remoteAudioEls) {
        try {
          element.muted = false;
          element.volume = 1;
          await element.play();
        } catch (err) {
          log(`Remote audio playback blocked: ${err.message || err}`);
        }
      }
    }

    async function attachRemoteAnalyser(track) {
      try {
        const mediaTrack = track.mediaStreamTrack;
        if (!mediaTrack) return;
        const context = await ensureAudioContext();
        const stream = new MediaStream([mediaTrack]);
        const source = context.createMediaStreamSource(stream);
        const analyser = context.createAnalyser();
        analyser.fftSize = 512;
        source.connect(analyser);
        analyserNodes.push({ source, analyser });
        readAnalyser(analyser, (level) => {
          remoteLevel = Math.max(remoteLevel, level);
        }, (bands) => {
          remoteBands.low += (bands.low - remoteBands.low) * 0.2;
          remoteBands.mid += (bands.mid - remoteBands.mid) * 0.24;
          remoteBands.high += (bands.high - remoteBands.high) * 0.28;
          remoteBands.transient = Math.max(bands.transient, remoteBands.transient * 0.86);
        });
      } catch (err) {
        log(`Reply meter unavailable: ${err.message || err}`);
      }
    }

    function resetRoom() {
      if (room) {
        if (typeof room.removeAllListeners === 'function') {
          room.removeAllListeners();
        }
      }
      room = null;
      if (micAnalyserStop) {
        micAnalyserStop();
        micAnalyserStop = null;
      }
      localAudioTrack = null;
      participantIdentity = '';
      analyserNodes = [];
      remoteBands = { low: 0, mid: 0, high: 0, transient: 0 };
      for (const element of remoteAudioEls) {
        element.remove();
      }
      remoteAudioEls = [];
      muted = micMode !== 'open';
      updateMuteButton();
    }

    async function connect() {
      const now = Date.now();
      if (now - lastConnectAttempt < 1200) return;
      lastConnectAttempt = now;
      reconnectBtn.disabled = true;
      try {
        unlockThinkingSound();
        if (room) {
          await room.disconnect();
          resetRoom();
        }
        setStatus('Connecting', false);
        setAgentState('connecting');
        const tokenResp = await fetch('/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: nameEl.value || 'Guest', desktop: desktopShell }),
        });
        if (!tokenResp.ok) throw new Error(`Token endpoint returned HTTP ${tokenResp.status}`);
        const tokenData = await tokenResp.json();

        room = new Room({
          adaptiveStream: false,
          dynacast: false,
        });

        room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
          if (track.kind !== Track.Kind.Audio) return;
          const fromAgent = participant.identity === AGENT_IDENTITY || participant.name === AGENT_NAME;
          if (!fromAgent) {
            log(`Ignoring non-agent audio from ${participant.name || participant.identity}`);
            return;
          }
          const element = track.attach();
          element.autoplay = true;
          element.playsInline = true;
          element.muted = false;
          element.volume = 1;
          element.dataset.livekitRemoteAudio = 'true';
          document.body.appendChild(element);
          remoteAudioEls.push(element);
          applyAudioOutputToElement(element).catch((err) => {
            log(`Reply audio output unavailable: ${err.message || err}`);
          });
          element.play().catch((err) => {
            log(`Hidden media element playback blocked: ${err.message || err}`);
          });
          attachRemoteAnalyser(track);
          startLiveKitAudio();
          setAgentState('speaking');
          log(`Audio subscribed from ${participant.name || participant.identity}`);
        });

        room.on(RoomEvent.DataReceived, (payload, participant, kind, topic) => {
          try {
            const text = new TextDecoder().decode(payload);
            const data = JSON.parse(text);
            if (topic === 'hermes.tool_cue' || data.type === 'tool_cue') {
              const visualCue = visualCueForTool(data);
              queueVisualCue(visualCue.kind, visualCue.value);
              cueToolSound(visualCue);
              spawnToolTicker(data, visualCue);
              showToolReadout(data, visualCue);
              const toolName = String(data.name || data.tool || 'tool').replace(/_/g, ' ');
              const toolStage = data.stage === 'generating' ? 'preparing' : 'running';
              appendTranscriptEntry('tool', toolName, data.label || '', {
                icon: visualCue.emoji || data.emoji || '⚙',
                at: data.at,
                badge: toolStage,
              });
              return;
            }
            if (topic === 'hermes.transcript' || data.type === 'transcript') {
              const role = data.role === 'assistant' ? 'assistant' : 'user';
              appendTranscriptEntry(
                role,
                role === 'assistant' ? 'Hermes' : 'You',
                data.text || '',
                { icon: role === 'assistant' ? 'HV' : 'You', at: data.at },
              );
              return;
            }
            if (topic === 'hermes.voice_affect' || data.type === 'voice_affect') {
              setAffectReadout(data);
              return;
            }
            if (topic !== 'hermes.agent_state') return;
            if (data.type !== 'agent_state') return;
            const errorDetail = String(data.error || '').trim();
            const stageDetail = data.stage === 'transcribing'
              ? 'Transcribing what you said.'
              : data.stage === 'hermes'
                ? 'Checking Hermes, memory, tools, or calendar.'
                : data.stage === 'kimi'
                  ? 'Thinking with Kimi.'
                  : data.stage === 'tts'
                    ? 'Preparing the voice reply.'
                    : '';
            const detail = errorDetail || stageDetail;
            if (errorDetail) {
              log(`ATTENTION: ${errorDetail}`);
            }
            if (data.toolCue) {
              const visualCue = visualCueForTool(data.toolCue);
              queueVisualCue(visualCue.kind, visualCue.value);
              cueToolSound(visualCue);
              spawnToolTicker(data.toolCue, visualCue);
              showToolReadout(data.toolCue, visualCue);
            }
            if (data.state === 'speaking' || data.stage === 'tts') {
              startLiveKitAudio();
            }
            setAgentState(data.state, detail);
          } catch (err) {
            log(`State message error: ${err.message || err}`);
          }
        });

        room.on(RoomEvent.Disconnected, () => {
          setStatus('Disconnected', false);
          setAgentState('disconnected');
          muteBtn.disabled = true;
          sendTextBtn.disabled = true;
          reconnectBtn.disabled = false;
          log('Disconnected');
        });

        await room.connect(tokenData.url, tokenData.token);
        participantIdentity = tokenData.identity;
        try {
          await publishMicrophone();
        } catch (err) {
          localAudioTrack = null;
          muteBtn.disabled = true;
          const insecureMicOrigin = !window.isSecureContext && !['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
          if (insecureMicOrigin) {
            showToast('Microphone requires HTTPS or localhost. Typed messages still work.');
            log('Microphone unavailable: open this app over HTTPS or localhost to allow browser mic access.');
          } else {
            showToast('Microphone is unavailable. Typed messages still work.');
            log(`Microphone unavailable: ${err.message || err}`);
          }
        }

        setStatus('Connected', true);
        setAgentState('listening');
        sendTextBtn.disabled = false;
        reconnectBtn.disabled = false;
        log(`Connected to ${tokenData.room}`);
      } catch (err) {
        setStatus('Error', false);
        setAgentState('error');
        showToast('Voice room did not open. Reconnect is available.');
        log(`ERROR: ${err.message || err}`);
        muteBtn.disabled = true;
        sendTextBtn.disabled = !room || room.state !== 'connected';
        reconnectBtn.disabled = false;
      }
    }

    function updateMuteButton() {
      const micActive = !muted;
      const modeLabel = micMode === 'open' ? 'open mic' : 'software toggle';
      muteBtn.classList.remove('active', 'talkback-active');
      muteBtn.classList.toggle('mic-active', micActive);
      dockEl?.classList.remove('talkback-active');
      dockEl?.classList.toggle('mic-active', micActive);
      muteBtn.setAttribute('aria-label', micActive ? 'Mute microphone' : 'Unmute microphone');
      muteBtn.title = micActive ? `Mute microphone (${modeLabel})` : `Unmute microphone (${modeLabel})`;
    }

    async function setMicrophoneMuted(nextMuted, reason = '') {
      muted = Boolean(nextMuted);
      updateMuteButton();
      if (!localAudioTrack) return;
      if (room?.localParticipant?.setMicrophoneEnabled) {
        await room.localParticipant.setMicrophoneEnabled(!muted);
      } else if (muted) {
        await localAudioTrack.mute();
      } else {
        await localAudioTrack.unmute();
      }
      if (reason) {
        log(reason);
      } else {
        log(muted ? 'Microphone muted' : 'Microphone live');
      }
    }

    async function toggleMute() {
      await setMicrophoneMuted(!muted);
    }

    async function sendTypedTurn() {
      const text = typedTextEl.value.trim();
      let completed = false;
      if (!text && !attachedFiles.length) return;
      if (!room || room.state !== 'connected') {
        showToast('Connect first.');
        log('Connect first');
        return;
      }
      startLiveKitAudio();
      sendTextBtn.disabled = true;
      typedTextEl.disabled = true;
      attachFileBtn.disabled = true;
      try {
        warmFeedbackAudio().catch(() => {});
        setAgentState('thinking', 'Checking Hermes now.');
        const attachments = await buildAttachmentPayload();
        const resp = await fetch('/text-turn', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, attachments, identity: participantIdentity || 'typed-web' }),
        });
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        typedTextEl.value = '';
        attachedFiles = [];
        renderAttachments();
        completed = true;
      } catch (err) {
        setAgentState('error');
        log(`TEXT ERROR: ${err.message || err}`);
      } finally {
        if (completed) {
          setAgentState('listening');
        }
        typedTextEl.disabled = false;
        attachFileBtn.disabled = false;
        sendTextBtn.disabled = !room || room.state !== 'connected';
        typedTextEl.focus();
      }
    }

      voiceInstructionsInputEl.value = fallback;
    });
    emotionToggleEl.addEventListener('change', () => queueSettingsSave({ emotionRecognition: emotionToggleEl.checked }));
    typedTextEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendTypedTurn();
      }
    });
    window.addEventListener('hermes:desktop-talkback', (event) => {
      const action = event.detail?.action || 'toggle';
      if (action === 'start' || action === 'open') {
        setMicrophoneMuted(false).catch((err) => log(`Mic start failed: ${err.message || err}`));
      } else if (action === 'stop' || action === 'close') {
        setMicrophoneMuted(true).catch((err) => log(`Mic stop failed: ${err.message || err}`));
      } else {
        toggleMute().catch((err) => log(`Mic toggle failed: ${err.message || err}`));
      }
    });
    window.addEventListener('hermes:desktop-config', (event) => {
      renderDesktopShortcutConfig(event.detail || {});
    });
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && voiceBehaviorPageEl.classList.contains('open')) {
        event.preventDefault();
        closeVoiceBehaviorPage();
        return;
      }
      if (!desktopShell || event.repeat || event.target === typedTextEl) return;
      if (event.code === 'Space' && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        toggleMute().catch((err) => log(`Mic shortcut failed: ${err.message || err}`));
      }
    });
    window.addEventListener('resize', resize);
    window.addEventListener('pointerdown', () => {
      ensureAudioContext().catch(() => {});
      startLiveKitAudio();
    });
    if (navigator.mediaDevices?.addEventListener) {
      navigator.mediaDevices.addEventListener('devicechange', () => {
        refreshAudioInputDevices().catch(() => {});
      });
    }

    resize();
    applyUiPalette(currentPaletteName);
    renderMicModeSetting();
    updateMuteButton();
    requestAnimationFrame(animate);
    setAgentState('starting');
    loadSettings();
    loadDesktopConfig();
    refreshAudioInputDevices().catch(() => {});
    window.setTimeout(connect, 250);
  </script>
</body>
</html>
