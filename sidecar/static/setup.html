<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Voice Setup</title>
  <style>
    @font-face {
      font-family: "Urbanist";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url("/static/fonts/urbanist-latin-400-normal.woff2") format("woff2");
    }

    @font-face {
      font-family: "Urbanist";
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url("/static/fonts/urbanist-latin-500-normal.woff2") format("woff2");
    }

    @font-face {
      font-family: "Urbanist";
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url("/static/fonts/urbanist-latin-600-normal.woff2") format("woff2");
    }

    @font-face {
      font-family: "Urbanist";
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url("/static/fonts/urbanist-latin-700-normal.woff2") format("woff2");
    }

    @font-face {
      font-family: "Urbanist";
      font-style: normal;
      font-weight: 800;
      font-display: swap;
      src: url("/static/fonts/urbanist-latin-800-normal.woff2") format("woff2");
    }

    :root {
      color-scheme: dark;
      --font-ui: "Urbanist", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-display: "Urbanist", ui-sans-serif, system-ui, sans-serif;
      --bg: oklch(7.6% 0.01 158);
      --panel: oklch(10.8% 0.012 150);
      --field: oklch(15% 0.011 135);
      --text: oklch(93.5% 0.014 106);
      --muted: oklch(72% 0.016 118);
      --line: color-mix(in oklch, var(--text) 16%, transparent);
      --line-strong: color-mix(in oklch, var(--text) 26%, transparent);
      --gold: oklch(76% 0.12 78);
      --red: oklch(68% 0.18 28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.014) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px),
        radial-gradient(circle at 50% 10%, color-mix(in oklch, var(--gold) 6%, transparent), transparent 32%),
        var(--bg);
      background-size: 32px 32px, 32px 32px, auto, auto;
      color: var(--text);
      font: 15px/1.45 var(--font-ui);
      letter-spacing: 0;
    }
    main {
      width: min(680px, 100%);
      display: grid;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 42px;
      line-height: 0.95;
      font-weight: 800;
      text-transform: uppercase;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    form {
      display: grid;
      gap: 14px;
      padding: 20px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: linear-gradient(180deg, color-mix(in oklch, var(--field) 28%, var(--panel)), var(--panel));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.44), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: color-mix(in oklch, var(--field) 92%, transparent);
      color: var(--text);
      padding: 9px 10px;
      font: inherit;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .check {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
    }
    .check input {
      width: 22px;
      min-height: 22px;
      accent-color: var(--gold);
    }
    button {
      min-height: 44px;
      border: 1px solid rgba(242, 184, 92, 0.45);
      border-radius: 6px;
      background: linear-gradient(180deg, color-mix(in oklch, var(--field) 58%, var(--gold) 18%), color-mix(in oklch, var(--field) 78%, var(--gold) 12%));
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      border-color: var(--line);
      background: color-mix(in oklch, var(--field) 88%, transparent);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .discover {
      display: grid;
      gap: 10px;
    }
    .candidates {
      display: grid;
      gap: 8px;
    }
    .candidate {
      min-height: 38px;
      text-align: left;
      padding: 8px 10px;
      border-color: var(--line);
      background: color-mix(in oklch, var(--field) 74%, transparent);
      color: var(--text);
      font-weight: 600;
    }
    .status {
      min-height: 22px;
      color: var(--muted);
    }
    .status.error { color: var(--red); }
    @media (max-width: 620px) {
      .row { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
      main { gap: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <div>
      <h1>Hermes Voice Setup</h1>
      <p>Connect this voice stack to your existing Hermes API server.</p>
    </div>
    <form id="setupForm">
      <label>
        Hermes API URL
        <input id="hermesApiUrl" name="hermesApiUrl" placeholder="host.docker.internal:8642" required>
      </label>
      <div class="discover">
        <div class="actions">
          <label>
            Discovery CIDRs
            <input id="discoveryCidrs" name="discoveryCidrs" placeholder="192.168.1.0/24,10.0.0.0/24">
          </label>
          <button id="discover" class="secondary" type="button">Find Hermes</button>
        </div>
        <div id="candidates" class="candidates"></div>
      </div>
      <label>
        Hermes API Key
        <input id="hermesApiKey" name="hermesApiKey" type="password" autocomplete="off" required>
      </label>
      <div class="row">
        <label>
          LiveKit public URL
          <input id="livekitPublicUrl" name="livekitPublicUrl" placeholder="ws://localhost:7880">
        </label>
        <label>
          TTS URL
          <input id="ttsUrl" name="ttsUrl" placeholder="http://tts:8889/v1/audio/speech">
        </label>
      </div>
      <div class="row">
        <label>
          STT provider
          <select id="sttProvider" name="sttProvider">
            <option value="auto">Packaged local / auto</option>
            <option value="local">Packaged local</option>
            <option value="openai">Hermes OpenAI STT</option>
            <option value="groq">Hermes Groq STT</option>
            <option value="mistral">Hermes Mistral STT</option>
          </select>
        </label>
        <label>
          STT model
          <input id="sttModel" name="sttModel" placeholder="base.en">
        </label>
      </div>
      <label class="check">
        <span>Emotion recognition</span>
        <input id="emotionRecognition" name="emotionRecognition" type="checkbox" checked>
      </label>
      <button id="save" type="submit">Save and Restart Voice Stack</button>
      <div id="status" class="status" role="status"></div>
    </form>
  </main>
  <script>
    const form = document.getElementById('setupForm');
    const statusEl = document.getElementById('status');
    const candidatesEl = document.getElementById('candidates');
    const discoverButton = document.getElementById('discover');
    const setupTokenParam = new URLSearchParams(window.location.search).get('setupToken') || '';
    if (setupTokenParam) {
      localStorage.setItem('hermes.setupToken', setupTokenParam);
      sessionStorage.setItem('hermes.setupToken', setupTokenParam);
    }

    function setupHeaders(extra = {}) {
      const token = sessionStorage.getItem('hermes.setupToken') || localStorage.getItem('hermes.setupToken') || '';
      return token ? { ...extra, 'X-Hermes-Setup-Token': token } : extra;
    }

    function setStatus(message, error = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', error);
    }

    async function loadStatus() {
      const resp = await fetch('/setup/status', { cache: 'no-store' });
      if (!resp.ok) return;
      const setup = await resp.json();
      if (setup.setupTokenRequired && !sessionStorage.getItem('hermes.setupToken') && !localStorage.getItem('hermes.setupToken')) {
        setStatus('Setup token required. Reopen the setup URL printed by the installer.', true);
        return;
      }
      document.getElementById('hermesApiUrl').value = setup.hermesApiUrl || 'http://host.docker.internal:8642/v1/chat/completions';
      document.getElementById('livekitPublicUrl').value = setup.livekitPublicUrl || 'ws://localhost:7880';
      document.getElementById('ttsUrl').value = setup.ttsUrl || 'http://tts:8889/v1/audio/speech';
      document.getElementById('emotionRecognition').checked = setup.emotionRecognition !== false;
      document.getElementById('discoveryCidrs').value = setup.discoveryCidrs || '';
      if (!setup.setupRequired) {
        setStatus('Setup is already complete. Opening Hermes Voice...');
        window.setTimeout(() => window.location.assign('/'), 900);
      }
    }

    function renderCandidates(candidates) {
      candidatesEl.replaceChildren();
      for (const candidate of candidates.slice(0, 8)) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'candidate';
        const auth = candidate.authRequired ? 'auth required' : 'models ok';
        const models = candidate.models && candidate.models.length ? ` - ${candidate.models.slice(0, 3).join(', ')}` : '';
        button.textContent = `${candidate.url} (${auth})${models}`;
        button.addEventListener('click', () => {
          document.getElementById('hermesApiUrl').value = candidate.url;
          setStatus('Hermes API URL selected.');
        });
        candidatesEl.appendChild(button);
      }
    }

    discoverButton.addEventListener('click', async () => {
      setStatus('Searching for Hermes...');
      candidatesEl.replaceChildren();
      discoverButton.disabled = true;
      try {
        const resp = await fetch('/setup/discover', {
          method: 'POST',
          headers: setupHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({
            hermesApiKey: form.hermesApiKey.value.trim(),
            cidrs: form.discoveryCidrs.value.trim(),
          }),
        });
        if (!resp.ok) throw new Error(await resp.text());
        const result = await resp.json();
        renderCandidates(result.candidates || []);
        if (result.candidates && result.candidates.length) {
          document.getElementById('hermesApiUrl').value = result.candidates[0].url;
          setStatus(`Found ${result.candidates.length} candidate${result.candidates.length === 1 ? '' : 's'}.`);
        } else {
          setStatus('No Hermes API candidates found.', true);
        }
      } catch (err) {
        setStatus(err.message || String(err), true);
      } finally {
        discoverButton.disabled = false;
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      setStatus('Saving setup...');
      const body = {
        hermesApiUrl: form.hermesApiUrl.value.trim(),
        hermesApiKey: form.hermesApiKey.value.trim(),
        livekitPublicUrl: form.livekitPublicUrl.value.trim(),
        ttsUrl: form.ttsUrl.value.trim(),
        sttProvider: form.sttProvider.value,
        sttModel: form.sttModel.value.trim(),
        emotionRecognition: form.emotionRecognition.checked,
        restart: true,
      };
      try {
        const resp = await fetch('/setup', {
          method: 'POST',
          headers: setupHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(body),
        });
        if (!resp.ok) throw new Error(await resp.text());
        setStatus('Saved. The sidecar is restarting; reload this page in a few seconds.');
      } catch (err) {
        setStatus(err.message || String(err), true);
      }
    });

    loadStatus().catch(() => {});
  </script>
</body>
</html>
